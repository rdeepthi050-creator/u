<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>I Love You</title>

<style>
body {
  margin: 0;
  background: radial-gradient(circle at top, #1a1a2e, #0f0f1a);
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: 'Poppins', sans-serif;
  overflow: hidden;
}

.container {
  position: relative;
  width: 320px;
  height: 200px;
}

/* Animated Lines */
.line {
  position: absolute;
  width: 6px;
  height: 100%;
  background: white;
  transform: scaleY(0);
  transform-origin: top;
  animation: draw 1.5s ease forwards;
}

.left { left: 0; }
.right { right: 0; }

@keyframes draw {
  to { transform: scaleY(1); }
}

/* Text */
.text {
  position: absolute;
  width: 100%;
  top: 50%;
  transform: translateY(-50%);
  text-align: center;
  font-size: 55px;
  letter-spacing: 8px;
  color: white;
  opacity: 0;
  animation: fadeIn 1s ease forwards 1.5s;
}

.heart {
  color: #ff2e63;
  text-shadow: 0 0 20px #ff2e63, 0 0 40px #ff2e63;
}

/* Glow animation */
.text span {
  animation: glow 2s infinite alternate;
}

@keyframes glow {
  from { text-shadow: 0 0 5px #fff; }
  to { text-shadow: 0 0 25px #ff2e63; }
}

@keyframes fadeIn {
  to { opacity: 1; }
}
</style>
</head>

<body>

<div class="container">
  <div class="line left"></div>
  <div class="line right"></div>

  <div class="text">
    I <span class="heart">❤</span> U
  </div>
</div>

</body>
</html>
