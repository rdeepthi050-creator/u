<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>I Love You</title>

<style>
body {
  margin: 0;
  background: #0f0f1a;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* SVG container */
svg {
  width: 500px;
  height: 200px;
}

/* Stroke animation */
.love-path {
  fill: none;
  stroke: #ffffff;
  stroke-width: 4;
  stroke-linecap: round;

  stroke-dasharray: 1000;
  stroke-dashoffset: 1000;

  animation: draw 2s ease forwards;
}

@keyframes draw {
  to {
    stroke-dashoffset: 0;
  }
}

/* Delay each letter */
.i { animation-delay: 0s; }
.heart { animation-delay: 0.5s; stroke: #ff3c6f; }
.u { animation-delay: 1s; }

</style>
</head>

<body>

<svg viewBox="0 0 500 200">

  <!-- I -->
  <path class="love-path i"
        d="M50 40 L50 160" />

  <!-- HEART -->
  <path class="love-path heart"
        d="M150 80 
           C150 50, 200 50, 200 80 
           C200 110, 150 140, 150 140 
           C150 140, 100 110, 100 80 
           C100 50, 150 50, 150 80 Z" />

  <!-- U -->
  <path class="love-path u"
        d="M300 40 
           L300 120 
           C300 150, 350 150, 350 120 
           L350 40" />

</svg>

</body>
</html>
