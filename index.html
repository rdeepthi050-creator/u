<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>I Love You</title>

<style>
body {
  margin: 0;
  background: #0f0f1a;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: 'Poppins', sans-serif;
}

.container {
  position: relative;
  width: 400px;
  height: 250px;
}

/* SVG styling */
svg {
  width: 100%;
  height: 100%;
}

.line {
  fill: none;
  stroke: white;
  stroke-width: 6;
  stroke-linecap: round;

  stroke-dasharray: 300;
  stroke-dashoffset: 300;
  animation: draw 1.5s ease forwards;
}

@keyframes draw {
  to {
    stroke-dashoffset: 0;
  }
}

/* Text */
.text {
  position: absolute;
  width: 100%;
  top: 50%;
  transform: translateY(-50%);
  text-align: center;
  font-size: 60px;
  letter-spacing: 8px;
  color: white;
  opacity: 0;
  animation: fadeIn 1s ease forwards 1.6s;
}

.heart {
  color: #ff3c6f;
  text-shadow: 0 0 20px #ff3c6f;
}

/* Glow effect */
.text span {
  animation: glow 2s infinite alternate;
}

@keyframes glow {
  from { text-shadow: 0 0 5px #fff; }
  to { text-shadow: 0 0 25px #ff3c6f; }
}

@keyframes fadeIn {
  to { opacity: 1; }
}
</style>
</head>

<body>

<div class="container">

  <!-- SVG lines (THIS is the real trick used in reel) -->
  <svg viewBox="0 0 400 250">
    <!-- Left vertical line -->
    <path d="M100 20 L100 230" class="line"/>

    <!-- Right vertical line -->
    <path d="M300 20 L300 230" class="line"/>
  </svg>

  <!-- Text -->
  <div class="text">
    I <span class="heart">❤</span> U
  </div>

</div>

</body>
</html>
