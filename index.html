<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>I ❤️ U</title>

<style>
body {
  margin: 0;
  background: #0f0f1a;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* container */
.wrapper {
  width: 400px;
  height: 200px;
}

/* svg */
svg {
  width: 100%;
  height: 100%;
}

/* stroke animation */
.path {
  fill: none;
  stroke: white;
  stroke-width: 5;
  stroke-linecap: round;

  stroke-dasharray: 800;
  stroke-dashoffset: 800;

  animation: draw 2s ease forwards;
}

/* stagger like reel */
.path:nth-child(1) { animation-delay: 0s; }
.path:nth-child(2) { animation-delay: 0.6s; stroke: #ff2e63; }
.path:nth-child(3) { animation-delay: 1.2s; }

@keyframes draw {
  to {
    stroke-dashoffset: 0;
  }
}
</style>
</head>

<body>

<div class="wrapper">

<svg viewBox="0 0 400 200">

  <!-- I -->
  <path class="path"
        d="M80 40 L80 160" />

  <!-- HEART -->
  <path class="path"
        d="M200 80 
           C200 50, 250 50, 250 80 
           C250 120, 200 150, 200 150 
           C200 150, 150 120, 150 80 
           C150 50, 200 50, 200 80 Z" />

  <!-- U -->
  <path class="path"
        d="M300 40 
           L300 120 
           C300 160, 360 160, 360 120 
           L360 40" />

</svg>

</div>

</body>
</html>
